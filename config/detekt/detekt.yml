build:
  maxIssues: 0

config:
  validation: true

style:
  MagicNumber:
    active: true
    # 精准豁免：
    # - ui 目录大量颜色/尺寸常量属于视觉参数；
    # - GameStateEncoder 的索引/偏移量属于 ONNX 输入向量协议；
    # - ScoreCalculatorTest 的期望值是规则断言样例。
    excludes:
      - '**/ui/**'
      - '**/ai/onnx/GameStateEncoder.kt'
      - '**/test/**/ScoreCalculatorTest.kt'
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '13'
      - '26'
      - '39'
      - '52'
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreNamedArgument: true
    ignoreAnnotation: true
  ReturnCount:
    active: true
    max: 3
    excludedFunctions:
      - equals
  LoopWithTooManyJumpStatements:
    active: true
    maxJumpCount: 1
    # AI 回合解析循环存在多个业务早退分支（结束局/回到人类回合/兜底失败）。
    excludes:
      - '**/controller/game/OnnxMatchViewModel.kt'
  FunctionOnlyReturningConstant:
    active: true
    # ONNX 输出维度接口预留给后续模型元信息，当前返回固定值用于兼容调用方。
    excludes:
      - '**/ai/onnx/OnnxInferenceEngine.kt'
  UseCheckOrError:
    active: true
    # 该处保留显式 IllegalStateException 以对齐 ONNX 初始化语义与异常封装。
    excludes:
      - '**/ai/onnx/OnnxInferenceEngine.kt'

complexity:
  LongMethod:
    active: true
    threshold: 80
    # 这两处是编排入口：一个是 AI 回合主循环，一个是 Compose 页面主组装。
    excludes:
      - '**/controller/game/OnnxMatchViewModel.kt'
      - '**/ui/room/RoomScreen.kt'
  LargeClass:
    active: true
    threshold: 600
  CyclomaticComplexMethod:
    active: true
    threshold: 15
    # ONNX 回合编排与动作转换包含多分支兜底逻辑，后续拆分前先做路径级豁免。
    excludes:
      - '**/controller/game/OnnxMatchViewModel.kt'
      - '**/ai/onnx/OnnxAIPlayerController.kt'
  NestedBlockDepth:
    active: true
    threshold: 4
    # 资产复制和 ONNX 决策流程均包含受控嵌套（IO + fallback），限定在具体文件。
    excludes:
      - '**/ai/onnx/OnnxAIPlayerController.kt'
      - '**/utils/AssetCopier.kt'
  TooManyFunctions:
    active: true
    # 这些文件为“编排/映射”角色，函数数偏多但职责集中且稳定。
    excludes:
      - '**/ai/onnx/GameStateEncoder.kt'
      - '**/ai/onnx/OnnxAIPlayerController.kt'
      - '**/controller/game/OnnxMatchViewModel.kt'
      - '**/navigation/ChuDaDiNavGraph.kt'
      - '**/test/**/GameTurnRulesTest.kt'
  ComplexCondition:
    active: true
    threshold: 4
  LongParameterList:
    active: true
    # Compose 对话框回调参数多，属于 UI 事件注入场景，仅豁免该文件。
    excludes:
      - '**/ui/room/RoomScreen.kt'

exceptions:
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Error
      - Exception
      - RuntimeException
      - Throwable
    # ONNX/VM 边界需要兜底原生与第三方异常，按文件级精准豁免，避免扩散到业务层。
    excludes:
      - '**/ai/onnx/OnnxAIPlayerController.kt'
      - '**/ai/onnx/OnnxInferenceEngine.kt'
      - '**/ai/onnx/OnnxModel.kt'
      - '**/ai/OnnxAIIntegrationExample.kt'
      - '**/controller/game/OnnxMatchViewModel.kt'
  PrintStackTrace:
    active: true
  RethrowCaughtException:
    active: true
    # OnnxModel 保留特定异常传递路径（取消/推理包装），限定单文件豁免。
    excludes:
      - '**/ai/onnx/OnnxModel.kt'

potential-bugs:
  UnsafeCast:
    active: true

naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable
      - Preview
  TopLevelPropertyNaming:
    active: false
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[a-z][A-Za-z0-9]*'

comments:
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
